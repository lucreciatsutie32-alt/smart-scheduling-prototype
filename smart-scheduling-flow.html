<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智能会议调度流程图</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #94a3b8;
      --border: #d8dee9;
      --initiator: #e8f3ff;
      --initiator-border: #2f6fed;
      --officer: #fff3db;
      --officer-border: #d98200;
      --system: #eaf7ea;
      --system-border: #2e7d32;
      --decision: #f5e8ff;
      --decision-border: #7b1fa2;
      --end: #eeeeee;
      --end-border: #555555;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .language-toggle {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f8fafc;
      flex: 0 0 auto;
    }

    .language-toggle button {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: transparent;
      color: #475569;
      font-weight: 700;
      cursor: pointer;
    }

    .language-toggle button.active {
      background: #2563eb;
      color: #ffffff;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
      color: #334155;
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid currentColor;
    }

    .dot.initiator { background: var(--initiator); color: var(--initiator-border); }
    .dot.officer { background: var(--officer); color: var(--officer-border); }
    .dot.system { background: var(--system); color: var(--system-border); }
    .dot.decision { background: var(--decision); color: var(--decision-border); }
    .dot.end { background: var(--end); color: var(--end-border); }

    .flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      padding: 10px 0 24px;
    }

    .node {
      min-width: 260px;
      max-width: 390px;
      padding: 13px 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      text-align: center;
      line-height: 1.45;
      font-size: 14px;
      font-weight: 600;
      background: #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.06);
      position: relative;
    }

    .node.small { min-width: 190px; max-width: 255px; }
    .node.wide { min-width: 360px; max-width: 590px; }
    .node.initiator { background: var(--initiator); border-color: var(--initiator-border); }
    .node.officer { background: var(--officer); border-color: var(--officer-border); }
    .node.system { background: var(--system); border-color: var(--system-border); }
    .node.decision { background: var(--decision); border-color: var(--decision-border); border-radius: 28px; }
    .node.end { background: var(--end); border-color: var(--end-border); border-radius: 999px; }

    .arrow {
      width: 2px;
      height: 28px;
      background: var(--line);
      position: relative;
      flex: 0 0 auto;
    }

    .arrow::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid var(--line);
    }

    .branches {
      width: 100%;
      display: grid;
      gap: 16px;
      align-items: start;
      justify-items: center;
      margin: 0 auto;
    }

    .branches.five { grid-template-columns: repeat(5, minmax(190px, 1fr)); }
    .branches.three { grid-template-columns: repeat(3, minmax(220px, 1fr)); }
    .branches.two { grid-template-columns: repeat(2, minmax(260px, 1fr)); }

    .branch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-width: 0;
    }

    .label {
      margin: 8px 0 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .join {
      width: min(92%, 1100px);
      height: 34px;
      border-bottom: 2px solid var(--line);
      border-left: 2px solid var(--line);
      border-right: 2px solid var(--line);
      margin-top: 4px;
      border-radius: 0 0 14px 14px;
      position: relative;
    }

    .join::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -28px;
      width: 2px;
      height: 28px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .fork {
      width: min(92%, 1100px);
      height: 36px;
      position: relative;
      margin-bottom: 2px;
    }

    .fork::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 18px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .fork::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 18px;
      height: 2px;
      background: var(--line);
    }

    .fork span {
      position: absolute;
      top: 18px;
      width: 2px;
      height: 18px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .fork span::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid var(--line);
    }

    .fork.two span:nth-child(1) { left: 25%; }
    .fork.two span:nth-child(2) { left: 75%; }

    .fork.three span:nth-child(1) { left: 16.67%; }
    .fork.three span:nth-child(2) { left: 50%; }
    .fork.three span:nth-child(3) { left: 83.33%; }

    .fork.five span:nth-child(1) { left: 10%; }
    .fork.five span:nth-child(2) { left: 30%; }
    .fork.five span:nth-child(3) { left: 50%; }
    .fork.five span:nth-child(4) { left: 70%; }
    .fork.five span:nth-child(5) { left: 90%; }

    .section-title {
      align-self: stretch;
      margin: 28px 0 14px;
      padding: 10px 14px;
      border-left: 5px solid #2563eb;
      background: #f8fafc;
      color: #1e293b;
      font-weight: 700;
      border-radius: 8px;
    }

    .note {
      margin-top: 24px;
      padding: 14px 16px;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #eff6ff;
      color: #334155;
      line-height: 1.6;
      font-size: 14px;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .page { box-shadow: none; border: none; max-width: none; }
      .flow { overflow: visible; }
      .language-toggle { display: none; }
    }

    @media (max-width: 1100px) {
      .header { flex-direction: column; }
      .branches.five { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .branches.three { grid-template-columns: 1fr; }
      .branches.two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>
      </div>
      <div class="language-toggle" aria-label="Language switcher">
        <button id="btn-zh" type="button">中文</button>
        <button id="btn-en" type="button">English</button>
      </div>
    </header>

    <div class="legend" aria-label="Legend">
      <span><i class="dot initiator"></i><b data-i18n="legendInitiator"></b></span>
      <span><i class="dot officer"></i><b data-i18n="legendOfficer"></b></span>
      <span><i class="dot system"></i><b data-i18n="legendSystem"></b></span>
      <span><i class="dot decision"></i><b data-i18n="legendDecision"></b></span>
      <span><i class="dot end"></i><b data-i18n="legendEnd"></b></span>
    </div>

    <section id="flow" class="flow" aria-label="Smart Scheduling process flow"></section>

    <div class="note" data-i18n="note"></div>
  </main>

  <script>

        calendarConfirm: '调度专员检查部长日历可用性，并确认会议预约',

        viewOutcomes: '授权用户查看会议结果和相关信息',
        end: '结束'
      },
      en: {
        title: 'Smart Scheduling Flow',
        subtitle: 'Updated process flow: there are two meeting initiators — Meeting Requester and Scheduling Officer. Under UC-08, the Scheduling Officer can create a meeting directly or schedule one from the waiting list.',
        legendInitiator: 'Initiation / Source',
        legendOfficer: 'Human action',
        legendSystem: 'System action',
        legendDecision: 'Decision',
        legendEnd: 'Start / End',
        note: 'Key correction: the current meeting initiators are the Meeting Requester and the Scheduling Officer. The Meeting Requester fills in and submits meeting information, then the Scheduling Officer reviews and continues the workflow. Under UC-08, the Scheduling Officer can create a meeting directly or schedule a request from the waiting list. For follow-up or recurring meetings, Sequential Meeting must be set to Yes and Serial Number must be maintained: the new meeting receives the incremented serial number and the linked previous meeting is also marked as sequential.',
        start: 'Start',
        source: 'Meeting initiator',
        requesterPath: 'Requester initiated',
        requesterSubmit: 'Meeting Requester fills in meeting information and submits the request',
        directCreation: 'Scheduling Officer initiated',
        officerDirect: 'Scheduling Officer fills the UC-08 direct request form and creates the meeting directly',
        waitingPath: 'Waiting-list scheduling',
        officerWaiting: 'Scheduling Officer selects a request from the waiting list and schedules it directly',
        seriesPath: 'Follow-up / recurring meeting',
        officerFollowup: 'For follow-up or recurring meetings, copy previous meeting data and allow edits',
        sequentialRule: 'Set Sequential Meeting = Yes and maintain incremented Serial Number relationship',
        assignMr: 'System assigns MR reference number and records audit trail',
        officerReview: 'Scheduling Officer reviews and completes meeting data',
        dataReady: 'Is data sufficient for scheduling?',
        requesterInput: 'Requester input needed',
        returnFields: 'Return selected fields to Requester',
        requesterUpdate: 'Requester updates and resubmits',
        backReview: 'Back to Scheduling Officer review',
        needAdvice: 'Needs scheduling advice',
        sendSchedulingConsult: 'Send Scheduling Consultation to selected Advisors',
        schedulingAdvisorResponse: 'Scheduling Advisor submits response',
        needEom: 'Needs EOM guidance',
        sendEom: 'Send Guidance Request to EOM',
        eomResponse: 'EOM submits scheduling response',
        reject: 'Reject',
        rejectRequest: 'Reject meeting request',
        lowPriority: 'Low priority / no slot',
        addWaiting: 'Add to waiting list',
        laterSchedule: 'Can be scheduled later by Scheduling Officer',
        mainPath: 'Main path after request data is ready',
        contentRequired: 'Is presentation or content required?',
        noContent: 'No content required',
        proceedBooking: 'Proceed to booking',
        needContent: 'Content required',
        attached: 'Is presentation attached?',
        no: 'No',
        incompleteAllowed: 'Proceed with incomplete content if allowed',
        yes: 'Yes',
        reviewNeeded: 'Content review needed?',
        contentReview: 'Content Officer reviews meeting materials',
        contentReady: 'Content ready?',
        contentReturn: 'Ready content returns to Scheduling Officer',
        calendarConfirm: 'Scheduling Officer checks Minister calendar availability and confirms booking',
        outlookInvite: 'System writes to Minister Outlook Calendar and sends meeting invitations',
        protocolRequired: 'Protocol required?',
        notifyProtocol: 'Notify Protocol / Ceremonial Team',
        noProtocol: 'No protocol notification',
        scheduled: 'Meeting scheduled',
        incompleteBeforeMeeting: 'Content still incomplete before meeting?',
        meetingProceed: 'Meeting proceeds as planned',
        contentReminder: 'System sends content reminders',
        deadlineExceeded: 'Content deadline exceeded?',
        eomAssessment: 'Transfer to EOM for Meeting Assessment',
        eomException: 'Does EOM grant exception?',
        approved: 'Approved',
        setDuration: 'Set granted duration or full exemption',
        notApproved: 'Not approved',
        removeCalendar: 'Remove from calendar and move to waiting list',
        postMeeting: 'Post-meeting closure',

      }
    };

    let currentLang = 'zh';

    function t(key) {
      return content[currentLang][key];
    }

    function node(textKey, type = '', size = '') {
      const el = document.createElement('div');
      el.className = ['node', type, size].filter(Boolean).join(' ');
      el.textContent = t(textKey);
      return el;
    }

    function arrow() {
      const el = document.createElement('div');
      el.className = 'arrow';
      return el;
    }

    function label(textKey) {
      const el = document.createElement('div');
      el.className = 'label';
      el.textContent = t(textKey);
      return el;
    }

    function branch(labelKey, nodes) {
      const el = document.createElement('div');
      el.className = 'branch';
      el.appendChild(label(labelKey));
      nodes.forEach((item, index) => {
        if (index > 0) el.appendChild(arrow());
        el.appendChild(item);
      });
      return el;
    }

    function branches(count, children) {
      const el = document.createElement('div');
      el.className = `branches ${count}`;
      children.forEach(child => el.appendChild(child));
      return el;
    }

    function fork(count) {
      const el = document.createElement('div');
      el.className = `fork ${count}`;
      const number = count === 'five' ? 5 : count === 'three' ? 3 : 2;
      for (let i = 0; i < number; i += 1) {
        el.appendChild(document.createElement('span'));
      }
      return el;
    }

    function join() {
      const el = document.createElement('div');
      el.className = 'join';
      return el;
    }

    function sectionTitle(textKey) {
      const el = document.createElement('div');
      el.className = 'section-title';
      el.textContent = t(textKey);
      return el;
    }

    function renderFlow() {
      const flow = document.getElementById('flow');
      flow.innerHTML = '';

      flow.append(
        node('start', 'end', 'small'),
        arrow(),
        node('source', 'decision'),
        fork('two'),
        branches('two', [
          branch('requesterPath', [node('requesterSubmit', 'initiator')]),
          branch('directCreation', [
            node('officerDirect', 'initiator'),
            fork('three'),
            branches('three', [
              branch('directCreation', [node('officerDirect', 'officer', 'small')]),
              branch('waitingPath', [node('officerWaiting', 'officer', 'small')]),
              branch('seriesPath', [node('officerFollowup', 'officer', 'small'), node('sequentialRule', 'system', 'small')])
            ])
          ])
        ]),
        join(),
        arrow(),
        node('assignMr', 'system', 'wide'),
        arrow(),
        node('officerReview', 'officer', 'wide'),
        arrow(),
        node('dataReady', 'decision'),
        fork('five'),
        branches('five', [
          branch('requesterInput', [node('returnFields', 'officer', 'small'), node('requesterUpdate', 'initiator', 'small'), node('backReview', 'officer', 'small')]),
          branch('needAdvice', [node('sendSchedulingConsult', 'officer', 'small'), node('schedulingAdvisorResponse', 'officer', 'small'), node('backReview', 'officer', 'small')]),
          branch('needEom', [node('sendEom', 'officer', 'small'), node('eomResponse', 'officer', 'small'), node('backReview', 'officer', 'small')]),
          branch('reject', [node('rejectRequest', 'officer', 'small'), node('end', 'end', 'small')]),
          branch('lowPriority', [node('addWaiting', 'officer', 'small'), node('laterSchedule', 'initiator', 'small')])
        ]),
        sectionTitle('mainPath'),
        node('contentRequired', 'decision'),
        fork('two')
      );

      const contentRequiredBranches = branches('two', [
        branch('noContent', [node('proceedBooking', 'officer')]),
        branch('needContent', [
          node('attached', 'decision'),
          branches('two', [
            branch('no', [node('incompleteAllowed', 'officer', 'small')]),
            branch('yes', [node('reviewNeeded', 'decision', 'small'), node('contentReview', 'officer', 'small'), node('contentReady', 'decision', 'small'), node('contentReturn', 'officer', 'small')])
          ])
        ])
      ]);
      flow.append(
        contentRequiredBranches,
        join(),
        arrow(),
        node('calendarConfirm', 'officer', 'wide'),
        arrow(),
        node('outlookInvite', 'system', 'wide'),
        arrow(),
        node('protocolRequired', 'decision'),
        fork('two'),
        branches('two', [
          branch('yes', [node('notifyProtocol', 'system')]),
          branch('no', [node('noProtocol', 'system')])
        ]),
        join(),
        arrow(),
        node('scheduled', 'system', 'wide'),
        arrow(),
        node('incompleteBeforeMeeting', 'decision'),
        fork('two'),
        branches('two', [
          branch('no', [node('meetingProceed', 'officer')]),
          branch('yes', [
            node('contentReminder', 'system'),
            node('deadlineExceeded', 'decision'),
            node('eomAssessment', 'officer'),
            node('eomException', 'decision'),
            branches('two', [
              branch('approved', [node('setDuration', 'officer', 'small')]),
              branch('notApproved', [node('removeCalendar', 'officer', 'small')])
            ])
          ])
        ]),
        sectionTitle('postMeeting'),
        node('retrieve', 'system', 'wide'),
        arrow(),
        node('viewOutcomes', 'system', 'wide'),
        arrow(),
        node('end', 'end', 'small')
      );
    }

    function renderText() {
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      document.title = t('title');
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.getElementById('btn-zh').classList.toggle('active', currentLang === 'zh');
      document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
    }

    function setLanguage(lang) {
      currentLang = lang;
      renderText();
      renderFlow();
    }

    document.getElementById('btn-zh').addEventListener('click', () => setLanguage('zh'));
    document.getElementById('btn-en').addEventListener('click', () => setLanguage('en'));
    setLanguage('zh');
  </script>
</body>
</html>
