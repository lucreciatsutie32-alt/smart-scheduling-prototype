<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Scheduling UC01-UC17 全量流程与字段</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--text:#172033;--muted:#64748b;--border:#d8dee9;--blue:#2563eb;--blue-bg:#eff6ff;--green:#15803d;--green-bg:#ecfdf5;--orange:#c2410c;--orange-bg:#fff7ed;--purple:#7e22ce;--purple-bg:#faf5ff;--gray:#475569;--gray-bg:#f8fafc}
    *{box-sizing:border-box} body{margin:0;padding:24px;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    .page{max-width:1760px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    .header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px} h1{margin:0 0 8px;font-size:28px}.subtitle{margin:0;color:var(--muted);line-height:1.55}
    .language-toggle{display:inline-flex;gap:6px;padding:5px;border:1px solid var(--border);border-radius:999px;background:#f8fafc;flex:0 0 auto}.language-toggle button{border:0;border-radius:999px;padding:8px 14px;background:transparent;color:#475569;font-weight:700;cursor:pointer}.language-toggle button.active{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.25)}
    .legend{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 22px;color:#334155;font-size:13px}.legend span{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:#fff}.dot{width:12px;height:12px;border-radius:50%;border:1px solid currentColor;display:inline-block}.source{background:var(--blue-bg);color:var(--blue)}.added{background:var(--purple-bg);color:var(--purple)}
    .summary{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:12px;margin-bottom:24px}.summary-card{border:1px solid var(--border);border-radius:12px;background:var(--gray-bg);padding:14px}.summary-card b{display:block;font-size:20px;margin-bottom:4px}.summary-card span{color:var(--muted);font-size:13px}
    .uc-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.uc{border:1px solid var(--border);border-radius:14px;background:#fff;overflow:hidden}.uc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:linear-gradient(90deg,#eff6ff,#fff)}.uc-id{font-weight:900;color:#1d4ed8}.uc-title{font-weight:900}.actor{font-size:13px;color:#334155;background:#fff;border:1px solid #bfdbfe;border-radius:999px;padding:5px 9px;white-space:nowrap}.uc-body{padding:14px 16px}.section{margin-top:12px}.section:first-child{margin-top:0}.section h3{margin:0 0 8px;font-size:13px;color:#334155;text-transform:uppercase;letter-spacing:.04em}.flow{margin:0;padding-left:20px;line-height:1.55}.flow li{margin:3px 0}.fields{display:flex;flex-wrap:wrap;gap:7px}.field{border:1px solid #bfdbfe;background:var(--blue-bg);color:#1e40af;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}.field.added{border-color:#e9d5ff;background:var(--purple-bg);color:var(--purple)}.rule{border-left:4px solid #f97316;background:var(--orange-bg);padding:8px 10px;border-radius:8px;color:#7c2d12;line-height:1.5;font-size:13px}.note{margin-top:22px;padding:14px 16px;border:1px solid #e9d5ff;border-radius:10px;background:var(--purple-bg);color:#4c1d95;line-height:1.6;font-size:14px}.compact{font-size:13px;color:var(--muted);line-height:1.5}
    @media(max-width:1200px){.uc-grid{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column}} @media print{body{background:#fff;padding:0}.page{box-shadow:none;border:none}.language-toggle{display:none}.uc-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="page">
    <header class="header"><div><h1 data-i18n="title"></h1><p class="subtitle" data-i18n="subtitle"></p></div><div class="language-toggle"><button id="btn-zh">中文</button><button id="btn-en">English</button></div></header>
    <div class="legend"><span><i class="dot source"></i><b data-i18n="legendSource"></b></span><span><i class="dot added"></i><b data-i18n="legendAdded"></b></span></div>
    <section class="summary" id="summary"></section>
    <section class="uc-grid" id="ucGrid"></section>
    <div class="note" data-i18n="addedNote"></div>
  </main>
<script>
const text={zh:{title:'Smart Scheduling UC01-UC17 全量流程与字段',subtitle:'基于 BRD UC-01 到 UC-17 重新梳理：每个 Use Case 展示主角色、关键流程、关键业务规则，以及对应 Data Dictionary / 字段。紫色字段为我为页面可读性和完整性补充的字段，不是原 Data Dictionary 明确列出的字段。',legendSource:'BRD / Data Dictionary 原始字段',legendAdded:'补充字段（非原始 Data Dictionary）',summary1:'会议申请与调度',summary2:'咨询与内容',summary3:'指令与日历',summary4:'治理与管理',summary5:'系统管理',flow:'流程',fields:'字段 / Data Dictionary',rules:'关键规则',addedNote:'补充字段说明：紫色字段用于把流程状态、操作结果、审计和系统配置呈现完整，例如 Audit Trail、Notification Status、Action Result、Permission Status、Card Score 等。这些字段是页面表达所需的建议字段，需在 SDD 或详细数据模型阶段确认是否落库。'},en:{title:'Smart Scheduling UC01-UC17 Flow and Fields',subtitle:'Reorganized from BRD UC-01 to UC-17. Each use case shows actor, key flow, business rules, and Data Dictionary fields. Purple fields are assistant-added for readability/completeness and are not explicitly listed in the original Data Dictionary.',legendSource:'Original BRD / Data Dictionary field',legendAdded:'Added field, not original Data Dictionary',summary1:'Request & Scheduling',summary2:'Consultation & Content',summary3:'Directive & Calendar',summary4:'Governance & Admin',summary5:'System Admin',flow:'Flow',fields:'Fields / Data Dictionary',rules:'Key rules',addedNote:'Added field note: purple fields make state, action result, audit, and configuration visible, such as Audit Trail, Notification Status, Action Result, Permission Status, and Card Score. They are recommended presentation/data-model fields and should be confirmed in SDD.'}};
const summaries=[['7','summary1'],['3','summary2'],['3','summary3'],['3','summary4'],['1','summary5']];
const ucs=[
{id:'UC-01',title:{zh:'Request a Meeting / 会议申请',en:'Request a Meeting'},actor:{zh:'会议申请人',en:'Meeting Requester'},flow:{zh:['填写新申请或打开草稿','按表单补全会议数据并提交','系统路由至调度专员','被退回或已安排后，可按允许字段更新并重新提交'],en:['Fill a new request or open a draft','Complete request form and submit','System routes to Scheduling Officer','Update allowed fields after return or after scheduling']},fields:['Previous Meetings','Current Requests','Request No.','Request Date','Meeting Title','Meeting Category','Meeting Date','Meeting Status','Data Complete?','Return Notes',{t:'Draft Status',a:1},{t:'Editable Returned Fields',a:1}],rule:{zh:'提交后不可自由编辑；仅在退回或已安排且被标记不完整时可编辑指定字段。Requester 可查看直接由调度专员安排后产生的 Sequential Meeting / Serial Number。',en:'After submission, free editing is not allowed; only returned or marked-incomplete fields can be edited. Requester can later view Sequential Meeting / Serial Number created by Scheduling Officer.'}},
{id:'UC-02',title:{zh:'Review Meeting Request – Scheduling / 调度审核',en:'Review Meeting Request – Scheduling'},actor:{zh:'调度专员',en:'Scheduling Officer'},flow:{zh:['打开当前请求列表','逐项核验字段','可安排、退回、咨询、请求 EOM、转内容、拒绝或加入等待列表'],en:['Open current requests','Verify fields item by item','Schedule, return, consult, request EOM guidance, transfer to content, reject, or wait-list']},fields:['Previous Directives','Current Directives','Previous Meetings','Current Requests','Waiting List','Applicant Name','Meeting Subject','Meeting Category','Meeting Date','Meeting Status','Data Complete?',{t:'Selected Fields for Return',a:1},{t:'Scheduling Decision',a:1}],rule:{zh:'共享工作篮；退回必须写 notes；等待列表仅能后续安排或取消；预约时写入 Outlook 并发送邀请，Presentation 可单独邮件发送。',en:'Shared work basket; return requires notes; wait-listed requests can only be scheduled or cancelled later; booking writes to Outlook and sends invitations, with presentation shared separately.'}},
{id:'UC-03',title:{zh:'Provide Scheduling Consultation / 调度咨询',en:'Provide Scheduling Consultation'},actor:{zh:'调度顾问',en:'Scheduling Advisor'},flow:{zh:['选择分配给自己的咨询子请求','查看请求数据','填写意见并回答是否适合安排','返回调度专员'],en:['Select assigned consultation sub-request','Review request data','Write statement and answer suitability','Return to Scheduling Officer']},fields:['Current Requests','Request No.','Applicant Name','Meeting Subject','Meeting Category','Meeting Date','Request Status','Data Complete?',{t:'SC Reference',a:1},{t:'Consultation Status',a:1}],rule:{zh:'仅显示分配给该顾问的请求；调度专员后续动作可撤回未响应子请求。',en:'Only advisor-specific requests are shown; unanswered sub-requests may be withdrawn when Scheduling Officer proceeds.'}},
{id:'UC-04',title:{zh:'Submit a Response / EOM 指导回复',en:'Submit a Response / EOM Guidance'},actor:{zh:'执行办公室经理',en:'Executive Office Manager'},flow:{zh:['从当前请求列表选择请求','查看请求数据','填写回复并判断是否适合安排','返回调度专员'],en:['Select request from current list','Review request data','Submit response and scheduling suitability','Return to Scheduling Officer']},fields:['Current Requests','Request No.','Applicant Name','Meeting Subject','Meeting Category','Meeting Date','Data Complete?',{t:'EOM Feedback',a:1},{t:'Suitability Decision',a:1}],rule:{zh:'请求分配给 EOM 角色而非个人；任一 EOM 提交后，所有同角色用户列表中移除该请求。',en:'Request is assigned to EOM role, not a person; once one EOM submits, it disappears for all role holders.'}},
{id:'UC-05',title:{zh:'Evaluate Content and Add Directives & Attendees / 内容评估',en:'Evaluate Content and Add Directives & Attendees'},actor:{zh:'内容专员',en:'Content Officer'},flow:{zh:['查看分配给内容专员的请求','审核内容并写 notes','可退回申请人或发起内容咨询','内容处理后返回调度流程'],en:['Open requests assigned to Content Officer','Review content and write notes','Return to requester or initiate content consultation','Return outcome to scheduling flow']},fields:['Current Requests','Request No.','Applicant Name','Meeting Subject','Meeting Category','Meeting Date','Meeting Status',{t:'Content Notes',a:1},{t:'Presentation Version',a:1},{t:'Content Readiness',a:1}],rule:{zh:'退回申请人时内容 notes 必填；Presentation 保留版本历史；内容咨询遵循调度咨询子请求规则，编号 CCYYMMDDXXX。',en:'Content notes are mandatory when returning to requester; presentation version history is retained; content consultation follows scheduling sub-request rules with CC reference.'}},
{id:'UC-06',title:{zh:'Provide Content Consultation / 内容咨询',en:'Provide Content Consultation'},actor:{zh:'内容顾问',en:'Content Advisor'},flow:{zh:['选择分配给自己的内容咨询子请求','查看请求与材料','填写内容反馈','返回内容专员'],en:['Select assigned content consultation sub-request','Review request and materials','Submit content feedback','Return to Content Officer']},fields:['Current Requests','Request No.','Applicant Name','Meeting Subject','Meeting Category','Meeting Date',{t:'CC Reference',a:1},{t:'Content Consultant Feedback',a:1}],rule:{zh:'只显示分配给该内容顾问的请求；提交或被调度专员后续动作撤回后，从顾问列表移除。',en:'Only assigned requests are shown; removed after submission or withdrawal due to later Scheduling Officer action.'}},
{id:'UC-07',title:{zh:'View and Close Scheduling Directives / 查看并关闭调度指令',en:'View and Close Scheduling Directives'},actor:{zh:'调度专员',en:'Scheduling Officer'},flow:{zh:['打开指令列表','选择相关指令','可点击 Request Meeting 以调度专员身份打开新会议申请','完成安排后关闭指令'],en:['Open directives list','Select directive','Use Request Meeting to open new request as Scheduling Officer','Close directive after requested meeting is scheduled']},fields:['Request Number','Directive Date','Directive','Linked Meeting','Due Date','Responsible Person','Directive Status','Request Meeting Button','Close Directive Button','Cancel Button',{t:'Closure Timestamp',a:1}],rule:{zh:'仅获取会议调度相关指令；接收时生成 DRYYMMDDXXX；关闭后进入历史指令列表。',en:'Only scheduling-related directives are retrieved; DR reference assigned on receipt; closed directives move to previous list.'}},
{id:'UC-08',title:{zh:'Schedule a Meeting Directly / 调度专员直接安排会议',en:'Schedule a Meeting Directly'},actor:{zh:'调度专员',en:'Scheduling Officer'},flow:{zh:['打开会议申请表并填写调度专员专属直发起表单','直接安排会议','或从 Waiting List 选择请求并安排','后续/周期会议复制前序会议数据并可修改'],en:['Open meeting request form and fill Scheduling Officer direct form','Schedule meeting directly','Or select from waiting list and schedule','For follow-up/recurring, copy previous meeting data and allow edits']},fields:['Previous Directives','Current Directives','Previous Meetings','Current Requests','Waiting List','Data Complete?','Sequential Meeting?','Previous Meeting','Serial Number',{t:'Direct Request Source',a:1}],rule:{zh:'调度专员安排前负责完整性判断；不能在安排前退回申请人。Follow-up/Recurring：新会议 Sequential Meeting=Yes，Serial Number 递增；前序会议也标记 Sequential Meeting=Yes。',en:'Scheduling Officer judges completeness before scheduling and cannot return before scheduling. Follow-up/Recurring: new meeting gets Sequential Meeting=Yes and incremented Serial Number; previous meeting is also marked sequential.'}},
{id:'UC-09',title:{zh:'Evaluating the Meeting / 系统内容延迟监控',en:'Evaluating the Meeting'},actor:{zh:'系统自动',en:'System Automated'},flow:{zh:['监控未完成内容的已安排会议','到阈值 X 发送提醒','到阈值 Y 转 EOM','如获例外则按新阈值继续监控'],en:['Monitor scheduled meetings with incomplete content','Send reminders at threshold X','Transfer to EOM at threshold Y','Continue monitoring by updated threshold after exception']},fields:['Request Number','Request Status','Requester','Meeting Owner','Presentation','When will the presentation be attached?','Content Exemption?','Granted Duration',{t:'Threshold X/Y',a:1},{t:'Reminder Status',a:1}],rule:{zh:'EOM 可将 New Duration 设为 0，表示完全豁免并停止通知。',en:'EOM may set New Duration to zero, meaning full exemption and notifications stop.'}},
{id:'UC-10',title:{zh:'Meeting Assessment / 会议评估',en:'Meeting Assessment'},actor:{zh:'执行办公室经理',en:'Executive Office Manager'},flow:{zh:['审核因内容超期转来的请求','批准例外并填写 Granted Duration','或不批准并移除日历、加入等待列表','若决策前材料上传完成，系统自动撤回'],en:['Review overdue-content request','Grant exception and enter Granted Duration','Or decline, remove calendar event, and move to waiting list','If content is uploaded before decision, system withdraws task']},fields:['Request Information','Meeting Information','Content','Invitees List','Scheduling Consultation','Directive','Content Consultation','Content Exemption?','Granted Duration','Send Button','Save Button','Cancel Button'],rule:{zh:'选择 Y 时系统需验证会议剩余时间 ≥ Y；上传完成会自动从 EOM 工作篮撤回并回到 Scheduled。',en:'When selecting Y, system verifies remaining time >= Y; completed upload withdraws from EOM basket and returns to Scheduled.'}},
{id:'UC-11',title:{zh:'Reschedule a Meeting / 改期、取消、转等待列表',en:'Reschedule a Meeting'},actor:{zh:'调度专员',en:'Scheduling Officer'},flow:{zh:['打开已安排会议请求','选择新日期并改期','或取消会议','或转入等待列表'],en:['Open scheduled meeting request','Select new date and reschedule','Or cancel meeting','Or move to waiting list']},fields:[{t:'Meeting Request',a:1},{t:'New Meeting Date',a:1},{t:'Cancellation Reason',a:1},{t:'Waiting List Reason',a:1},{t:'Calendar Event ID',a:1}],rule:{zh:'调度专员可在安排后任意时间改期、取消或转等待列表；取消或转等待列表时删除日历预约并通知礼宾（如需）。',en:'Scheduling Officer may reschedule, cancel, or move to waiting list after scheduling; cancellation/wait-list removes calendar event and notifies Protocol if required.'}},
{id:'UC-12',title:{zh:'Meeting Closure and Documenting Outcomes / 会后闭环',en:'Meeting Closure and Documenting Outcomes'},actor:{zh:'系统自动',en:'System Automated'},flow:{zh:['从 ADAAM 获取会议状态','获取会议纪要和相关指令','授权用户在会议页查看详情','如有新指令，调度专员进入 UC-07 处理'],en:['Retrieve meeting status from ADAAM','Retrieve minutes and related directives','Expose details to authorized users','If directive is received, Scheduling Officer handles via UC-07']},fields:[{t:'Meeting Status',a:1},{t:'Meeting Minutes',a:1},{t:'Associated Directives',a:1},{t:'Actual Attendance',a:1},{t:'Access Permissions',a:1}],rule:{zh:'会议状态包括 Completed、Postponed、Delegated、Meeting Extended。',en:'Meeting status includes Completed, Postponed, Delegated, and Meeting Extended.'}},
{id:'UC-13',title:{zh:'Update Organizational Structure / 更新组织架构',en:'Update Organizational Structure'},actor:{zh:'组织架构管理员',en:'Organizational Structure Administrator'},flow:{zh:['查看组织架构','选择职位并更新岗位描述和任职人员','可新增或移除分支/职位','点击 Update 并确认后保存'],en:['View organization structure','Select position and update job description/person','Add or remove branch/position','Click Update and confirm to save']},fields:[{t:'Organization Unit',a:1},{t:'Position',a:1},{t:'Job Description',a:1},{t:'Assigned Person',a:1},{t:'Person Search',a:1}],rule:{zh:'可无限制添加/移除职位，也可在两个职位之间插入职位；支持按姓名、邮箱、手机号搜索人员。',en:'Positions can be added/removed without restriction and inserted between positions; people search supports name, email, or mobile.'}},
{id:'UC-14',title:{zh:'Add / Update a Business Card / 业务卡片管理',en:'Add / Update a Business Card'},actor:{zh:'Chief of Staff / Business Owner',en:'Chief of Staff / Business Owner'},flow:{zh:['Chief of Staff 创建卡片','填写 topic 和 Business Owner','添加一个或多个 Meeting Series','Business Owner 查看 card、series、meeting、directive 详情','可转移或从 card 删除 series'],en:['Chief of Staff creates card','Add topic and Business Owner','Add one or more Meeting Series','Business Owner views card, series, meeting, directive details','Transfer or remove series from card']},fields:[{t:'Business Card Name',a:1},{t:'Topic',a:1},{t:'Business Owner',a:1},{t:'Meeting Series',a:1},{t:'Linked Meeting',a:1},{t:'Directive Status',a:1},{t:'Card Score',a:1},{t:'Series Score',a:1},{t:'Permission Status',a:1}],rule:{zh:'每张 card 至少一个 series；保存 Business Owner 后自动授予 View Cards 与 Scheduling Advisor 权限；替换/删除时撤销，除非仍拥有其他 card。Series 第三次 recurrence 时触发通知。',en:'Each card needs at least one series; saving Business Owner grants View Cards and Scheduling Advisor permissions; revoked on replacement/deletion unless they own another card. Third recurrence triggers notification.'}},
{id:'UC-15',title:{zh:'Update Organizational Structure / 更新组织架构（重复项）',en:'Update Organizational Structure (Duplicate)'},actor:{zh:'组织架构管理员',en:'Organizational Structure Administrator'},flow:{zh:['与 UC-13 内容基本重复','更新岗位描述与任职人员','新增或移除分支/职位'],en:['Substantially duplicates UC-13','Update job description and assigned person','Add or remove branch/position']},fields:[{t:'Same as UC-13',a:1},{t:'Duplicate Confirmation',a:1}],rule:{zh:'BRD 中 UC-13 与 UC-15 重复，建议在 SDD 中确认是否合并或保留两个编号。',en:'UC-13 and UC-15 duplicate each other in BRD; confirm in SDD whether to merge or keep both IDs.'}},
{id:'UC-16',title:{zh:'Minister Screen / 部长界面',en:'Minister Screen'},actor:{zh:'部长 / 执行办公室',en:'Minister / Executive Office'},flow:{zh:['查看指令并可通过会话助手查询','查看会议并查询详情','可委托会议并添加指令','可取消会议或 pass 会议'],en:['View directives and query via conversational agent','View meetings and query details','Delegate meeting and add directives','Cancel or pass meeting']},fields:[{t:'Directive List',a:1},{t:'Meeting List',a:1},{t:'Delegate',a:1},{t:'Voice/Text Directive',a:1},{t:'Cancellation Reason',a:1},{t:'Action Result',a:1}],rule:{zh:'会议时间已过不可操作；仅显示已准备好可安排的会议，仍等待 presentation 的会议不展示。',en:'No action after meeting time has elapsed; only meetings ready for scheduling are shown; meetings awaiting presentation are hidden.'}},
{id:'UC-17',title:{zh:'System Administration / 系统管理',en:'System Administration'},actor:{zh:'系统管理员',en:'System Administrator'},flow:{zh:['新增用户并选择权限','更新用户资料和权限','删除用户','按系统或角色启停通知/SLA','更新内容处理时间参数'],en:['Add user and select permissions','Update user details and permissions','Delete user','Enable/disable notifications/SLA by system or role','Update content processing time parameters']},fields:[{t:'User Name',a:1},{t:'User Details',a:1},{t:'Permissions',a:1},{t:'Account Status',a:1},{t:'Notification Setting',a:1},{t:'SLA Setting',a:1},{t:'Content Processing Time',a:1}],rule:{zh:'至少选择一个权限；提交会议申请权限自动授予；用户停用后不能登录且停止通知；删除用户不删除其历史数据。',en:'At least one permission is required; request-submission permission is auto-granted; deactivated users cannot log in and stop receiving notifications; deleted user data remains.'}}
];
let lang='zh'; const tr=k=>text[lang][k]||k;
function render(){document.documentElement.lang=lang==='zh'?'zh-CN':'en';document.title=tr('title');document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=tr(e.dataset.i18n));document.getElementById('btn-zh').classList.toggle('active',lang==='zh');document.getElementById('btn-en').classList.toggle('active',lang==='en');
 const sum=document.getElementById('summary');sum.innerHTML='';summaries.forEach(([n,k])=>{const d=document.createElement('div');d.className='summary-card';d.innerHTML=`<b>${n}</b><span>${tr(k)}</span>`;sum.appendChild(d)});
 const grid=document.getElementById('ucGrid');grid.innerHTML='';ucs.forEach(uc=>{const card=document.createElement('article');card.className='uc';card.innerHTML=`<div class="uc-head"><div><div class="uc-id">${uc.id}</div><div class="uc-title">${uc.title[lang]}</div></div><div class="actor">${uc.actor[lang]}</div></div><div class="uc-body"><div class="section"><h3>${tr('flow')}</h3><ol class="flow">${uc.flow[lang].map(x=>`<li>${x}</li>`).join('')}</ol></div><div class="section"><h3>${tr('fields')}</h3><div class="fields">${uc.fields.map(f=>typeof f==='string'?`<span class="field">${f}</span>`:`<span class="field added">${f.t}</span>`).join('')}</div></div><div class="section"><h3>${tr('rules')}</h3><div class="rule">${uc.rule[lang]}</div></div></div>`;grid.appendChild(card)});}
document.getElementById('btn-zh').onclick=()=>{lang='zh';render()};document.getElementById('btn-en').onclick=()=>{lang='en';render()};render();
</script>
</body>
</html>
